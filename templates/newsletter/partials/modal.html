<div id="newsletter-modal" x-show="newsletterOpen" x-cloak class="fixed inset-0 z-[60] flex items-center justify-center p-4">
    <div @click="newsletterOpen = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden transform transition-all" 
         x-show="newsletterOpen" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
        
        <button @click="newsletterOpen = false" class="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-600 transition">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>

        <div class="p-8">
            <div class="bg-red-50 w-16 h-16 rounded-full flex items-center justify-center mb-6 mx-auto">
                <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </div>
            
            <h3 class="font-serif text-2xl font-bold text-center text-gray-900 mb-2">Restez informé</h3>
            <p class="text-gray-600 text-center text-sm mb-8">Recevez chaque matin l'essentiel de l'actualité décrypté par notre rédaction.</p>
            
            <form hx-post="{% url 'newsletter:subscribe' %}" hx-swap="outerHTML" hx-indicator="#newsletter-spinner">
                {% csrf_token %}
                <div class="mb-4">
                    <input type="email" name="email" placeholder="votre@email.com" required
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all text-gray-900">
                </div>
                <button type="submit" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 transition shadow-lg shadow-red-600/20 flex items-center justify-center gap-2">
                    <span id="newsletter-spinner" class="htmx-indicator animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
                    S'abonner gratuitement
                </button>
            </form>
            
            <p class="text-[10px] text-gray-400 text-center mt-6">
                En vous inscrivant, vous acceptez notre politique de confidentialité. Vous pouvez vous désinscrire à tout moment.
            </p>
        </div>
    </div>
</div>

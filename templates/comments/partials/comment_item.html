<div class="flex space-x-4 bg-gray-50/50 p-4 rounded-xl border border-transparent hover:border-gray-100 transition-colors">
    <div class="flex-shrink-0">
        <div class="h-10 w-10 rounded-full bg-gray-200 flex items-center justify-center font-bold text-gray-500 text-sm">
            {{ comment.author.username|first|upper }}
        </div>
    </div>
    <div class="flex-1">
        <div class="flex items-center justify-between mb-1">
            <h4 class="text-sm font-bold text-gray-900">{{ comment.author.username }}</h4>
            <span class="text-xs text-gray-400">{{ comment.created_at|timesince }} ago</span>
        </div>
        <div class="text-gray-700 text-sm leading-relaxed">
            {{ comment.content|linebreaks }}
        </div>
    </div>
</div>

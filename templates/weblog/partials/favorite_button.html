<button hx-post="{% url 'weblog:toggle_favorite' article.pk %}" 
        hx-target="this" 
        hx-swap="outerHTML"
        class="flex items-center gap-2 px-4 py-2 rounded-lg transition {% if is_favorite %}bg-red-50 text-red-600 border border-red-200{% else %}bg-gray-100 text-gray-600 border border-gray-200 hover:bg-gray-200{% endif %}">
    <svg class="w-5 h-5 {% if is_favorite %}fill-current{% else %}fill-none{% endif %}" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
    </svg>
    <span class="text-sm font-bold">{% if is_favorite %}Favori{% else %}Ajouter aux favoris{% endif %}</span>
</button>
